<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Model Tracking</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body data-theme="light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Multi-Model Tracking</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button id="theme-toggle" class="btn btn-outline-light">
                            <i class="fas fa-moon"></i> Dark Mode
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold animate__animated animate__fadeIn">Multi-Model Tracking</h1>
            <p class="lead animate__animated animate__fadeIn animate__delay-1s">Real-time tracking.</p>
        </div>

        <!-- Live Video Feed and Screenshot Preview -->
        <div class="row justify-content-center align-items-center mb-5">
            <!-- Live Video Feed -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-lg h-100 animate__animated animate__fadeInUp">
                    <div class="card-body">
                        <h5 class="card-title text-center fw-bold">Live Video Feed</h5>
                        <div id="video-feed" class="text-center">
                            <img src="{{ url_for('video_feed', tracking_type='face_mesh') }}" alt="Video Feed" class="img-fluid rounded" loading="lazy">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Screenshot Preview -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-lg h-100 animate__animated animate__fadeInUp animate__delay-1s">
                    <div class="card-body">
                        <h5 class="card-title text-center fw-bold">Screenshot Preview</h5>
                        <div id="screenshot-preview" class="text-center">
                            <img src="{{ url_for('static', filename='screenshot.png') }}" alt="Screenshot Preview" class="img-fluid rounded" id="screenshot-img" loading="lazy">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="col-md-4">
                <div class="align-items-center">
                    <div class="gap-2 d-md-flex flex-column justify-content-md-center">
                        <button class="btn btn-gradient btn-lg animate__animated animate__fadeInLeft" onclick="startTracking('face_mesh')">
                            <i class="fas fa-play"></i> Face Mesh
                        </button>
                        <button class="btn btn-gradient btn-lg animate__animated animate__fadeInLeft animate__delay-1s" onclick="startTracking('body_posture')">
                            <i class="fas fa-play"></i> Body Posture
                        </button>
                        <button class="btn btn-gradient btn-lg animate__animated animate__fadeInLeft animate__delay-2s" onclick="startTracking('hand_tracking')">
                            <i class="fas fa-play"></i> Hand Tracking
                        </button>
                        <button class="btn btn-gradient btn-lg animate__animated animate__fadeInLeft animate__delay-3s" onclick="startTracking('iris_tracking')">
                            <i class="fas fa-play"></i> Iris Tracking
                        </button>
                        <button class="btn btn-gradient btn-lg animate__animated animate__fadeInRight animate__delay-4s" onclick="stopTracking()">
                            <i class="fas fa-stop"></i> Stop
                        </button>
                        <button class="btn btn-gradient btn-lg animate__animated animate__fadeInRight animate__delay-5s" onclick="takeScreenshot()">
                            <i class="fas fa-camera"></i> Screenshot
                        </button>
                        <a id="download-link" class="btn btn-gradient btn-lg animate__animated animate__fadeInRight animate__delay-6s" href="{{ url_for('static', filename='screenshot.png') }}" download="screenshot.png" style="display: none;">
                            <i class="fas fa-download"></i> Download
                        </a>
                        <button class="btn btn-gradient btn-lg animate__animated animate__fadeInLeft animate__delay-7s" onclick="exampleFunction()">
                            <i class="fas fa-info-circle"></i> Example
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <button class="btn btn-primary btn-floating" onclick="takeScreenshot()">
        <i class="fas fa-camera"></i>
    </button>

    <!-- Toast Notification -->
    <div id="toast" class="toast align-items-center text-white bg-success" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">Screenshot saved successfully!</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>

    <!-- Bootstrap JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <!-- Custom JS -->
    <script>
        // Dark Mode Toggle with Local Storage
        const themeToggle = document.getElementById("theme-toggle");
        const body = document.body;

        // Load saved theme
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
            body.dataset.theme = savedTheme;
            themeToggle.innerHTML = savedTheme === "dark" ? '<i class="fas fa-sun"></i> Light Mode' : '<i class="fas fa-moon"></i> Dark Mode';
        }

        // Toggle theme
        themeToggle.addEventListener("click", () => {
            body.dataset.theme = body.dataset.theme === "dark" ? "light" : "dark";
            localStorage.setItem("theme", body.dataset.theme);
            themeToggle.innerHTML = body.dataset.theme === "dark" ? '<i class="fas fa-sun"></i> Light Mode' : '<i class="fas fa-moon"></i> Dark Mode';
        });

        // Start Tracking
        function startTracking(type) {
            fetch(`/start/${type}`)
                .then(response => response.text())
                .then(data => {
                    // alert(data);
                    document.getElementById("video-feed").innerHTML = `
                        <img src="{{ url_for('video_feed', tracking_type='') }}${type}" alt="Video Feed" class="img-fluid rounded">
                    `;
                })
                .catch(error => console.error(error));
        }

        // Stop Tracking
        function stopTracking() {
            fetch("/stop")
                .then(response => response.text())
                // .then(data => alert(data))
                .catch(error => console.error(error));
        }

        function exampleFunction(){
            window.location.href = "http://127.0.0.1:5000"
        }
        // Take Screenshot
        function takeScreenshot() {
            fetch("/screenshot")
                .then(response => response.text())
                .then(data => {
                    // alert(data);
                    // Refresh the screenshot preview
                    const screenshotImg = document.getElementById("screenshot-img");
                    screenshotImg.src = "{{ url_for('static', filename='screenshot.png') }}?t=" + new Date().getTime();

                    // Show the download button
                    const downloadLink = document.getElementById("download-link");
                    downloadLink.style.display = "inline-block";

                    // Show toast notification
                    const toast = new bootstrap.Toast(document.getElementById("toast"));
                    toast.show();
                })
                .catch(error => console.error(error));
        }
    </script>
</body>
</html>
