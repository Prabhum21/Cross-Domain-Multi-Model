<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture-Based Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-blue-900 flex justify-center items-center min-h-screen">
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-2xl shadow-2xl text-center w-3/4 md:w-1/2">
        <a href="/" class="absolute top-4 left-4 text-gray-300 hover:text-blue-400 transition-all">← Back to Home</a>
        <h1 class="text-3xl font-bold text-blue-400">🖐 Gesture-Based Control</h1>
        <p class="text-gray-300 mt-2">Control your system with gestures.</p>

        <div class="flex justify-center my-6">
            <img src="{{ url_for('gesture_feed') }}" class="rounded-xl shadow-lg border border-gray-500 w-full md:w-3/4 hover:scale-105 transition-all">
        </div>

        <div class="flex justify-center gap-4">
            <button onclick="toggleFullScreen()" class="bg-blue-600 text-white px-6 py-3 rounded-xl shadow-md hover:bg-blue-700 hover:scale-105 transition-all">
                🔳 Fullscreen
            </button>
            <button onclick="showInstructions()" class="bg-gray-600 text-white px-6 py-3 rounded-xl shadow-md hover:bg-gray-700 hover:scale-105 transition-all">
                ℹ️ Instructions
            </button>
        </div>
    </div>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function showInstructions() {
            alert("🖐 Gesture Controls:\n➡️ Swipe Right = Next App\n⬅️ Swipe Left = Previous App\n⬆️ Swipe Up = Volume Up\n⬇️ Swipe Down = Volume Down\n👍 Thumbs Up = Play/Pause\n👎 Thumbs Down = Mute/Unmute\n✋ Open Hand = Screenshot\n🤏 Pinch = Fullscreen");
        }
    </script>
</body>
</html>
