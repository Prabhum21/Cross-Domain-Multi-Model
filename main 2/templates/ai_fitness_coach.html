<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fitness Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-blue-900 text-white flex justify-center items-center min-h-screen">
    <div class="relative w-full max-w-lg p-8 bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/20 text-center">
        <a href="/" class="absolute top-4 left-4 text-gray-300 hover:text-blue-400 transition-all">← Back to Home</a>
        <h1 class="text-4xl font-extrabold text-blue-400 flex items-center justify-center gap-2">
            🏋️ AI Fitness Coach
        </h1>
        <p class="text-gray-300 mt-2 text-lg">Track your workouts with AI-powered guidance.</p>

        <!-- Exercise Selection -->
        <div class="mt-6">
            <label for="exercise-select" class="text-lg font-semibold text-gray-200">Choose an Exercise:</label>
            <select id="exercise-select" class="w-full p-3 border border-gray-500 rounded-lg bg-gray-800 text-gray-200 mt-2 focus:ring-2 focus:ring-blue-500 transition">
                <option value="squat">🏋️ Squats</option>
                <option value="pushup">💪 Push-Ups</option>
                <option value="jumping_jack">🤸 Jumping Jacks</option>
            </select>
        </div>

        <div class="flex justify-center my-5">
            <img id="video-stream" src="{{ url_for('ai_fitness_feed') }}" 
                class="rounded-xl shadow-lg border border-gray-500 w-full md:w-3/4 transition-transform hover:scale-105 hover:shadow-xl">
        </div>

        <p class="text-lg font-semibold text-gray-300">Selected Exercise: <span id="exercise-name" class="text-blue-300">Squats</span></p>
        <p class="text-3xl font-bold text-blue-400 mt-2">Reps: <span id="reps-count">0</span></p>

        <div class="flex justify-center gap-4 mt-6">
            <button onclick="toggleFullScreen()" 
                class="bg-blue-500 text-white px-6 py-3 rounded-xl shadow-md hover:bg-blue-600 transition duration-300 transform hover:scale-105">
                🔳 Fullscreen
            </button>
            <button onclick="showInstructions()" 
                class="bg-gray-700 text-white px-6 py-3 rounded-xl shadow-md hover:bg-gray-800 transition duration-300 transform hover:scale-105">
                ℹ️ Instructions
            </button>
        </div>
    </div>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function showInstructions() {
            alert("🏋️ AI Fitness Coach\n- Choose an exercise mode.\n- Perform the exercise and track reps in real-time.");
        }

        document.getElementById("exercise-select").addEventListener("change", function () {
            let selectedExercise = this.value;
            document.getElementById("exercise-name").textContent = selectedExercise.charAt(0).toUpperCase() + selectedExercise.slice(1);
            fetch('/set_exercise', {
                method: 'POST',
                body: new URLSearchParams({ exercise: selectedExercise }),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
        });
    </script>
</body>
</html>
