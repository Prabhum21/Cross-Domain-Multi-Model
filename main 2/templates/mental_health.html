<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Custom CSS for the loading spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ec4899;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-blue-900 text-white flex justify-center items-center min-h-screen font-inter">
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-2xl shadow-2xl text-center w-11/12 md:w-2/3 lg:w-1/2 xl:w-1/3">
        <!-- Back to Home Button -->
        <a href="{{ url_for('index') }}" class="absolute top-4 left-4 bg-pink-600/20 p-2 rounded-lg hover:bg-pink-600/30 transition-all">
            ← Back to Home
        </a>

        <h1 class="text-4xl font-bold text-pink-400 mb-6">🧠 Mental Health Assistant</h1>
        <p class="text-gray-300 mb-8">Track and improve your mental well-being with AI-powered support.</p>

        <!-- Emotion Detection -->
        <div class="mb-8">
            <h2 class="text-2xl font-semibold text-pink-400 mb-4">Emotion Detection</h2>
            
            <!-- Video Feed -->
            <div id="video-container" class="relative">
                <img id="video-feed" src="{{ url_for('video_feed') }}" width="100%" class="rounded-lg border border-white/20">
                
                <!-- Loading Spinner -->
                <div id="loading-spinner" class="absolute inset-0 flex justify-center items-center bg-black/50 rounded-lg">
                    <div class="loader"></div>
                </div>
                
                <!-- Error Message -->
                <div id="error-message" class="absolute inset-0 flex justify-center items-center bg-black/50 rounded-lg hidden">
                    <p class="text-red-400 text-lg">Error: Could not access the camera.</p>
                </div>
            </div>
            
            <!-- Detected Emotion -->
            <p id="emotion" class="text-gray-300 mt-4">Emotion: <span id="emotion-text">Neutral</span></p>
        </div>

        <!-- Guided Meditation -->
        <div>
            <h2 class="text-2xl font-semibold text-pink-400 mb-4">Guided Meditation</h2>
            <div id="meditation-timer" class="text-4xl font-bold text-pink-400 mb-6">00:00</div>
            <button id="start-meditation" class="bg-pink-600/20 p-3 rounded-lg hover:bg-pink-600/30 transition-all">
                Start Meditation
            </button>
            <button id="stop-meditation" class="bg-gray-600/20 p-3 rounded-lg hover:bg-gray-600/30 transition-all ml-4">
                Stop
            </button>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Function to update the detected emotion
        async function updateEmotion() {
            try {
                const response = await fetch("{{ url_for('get_emotion') }}");
                const data = await response.json();
                document.getElementById("emotion-text").textContent = data.emotion;
            } catch (error) {
                console.error("Error fetching emotion data:", error);
            }
        }

        // Update emotion every 2 seconds
        setInterval(updateEmotion, 2000);

        // Meditation Timer
        let meditationTime = 0;
        let meditationInterval;
        document.getElementById("start-meditation").addEventListener("click", () => {
            clearInterval(meditationInterval);
            meditationTime = 0;
            meditationInterval = setInterval(() => {
                meditationTime++;
                let minutes = Math.floor(meditationTime / 60);
                let seconds = meditationTime % 60;
                document.getElementById("meditation-timer").textContent = 
                    (minutes < 10 ? "0" : "") + minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
            }, 1000);
        });

        document.getElementById("stop-meditation").addEventListener("click", () => {
            clearInterval(meditationInterval);
        });

        // Handle video feed loading and errors
        const videoFeed = document.getElementById("video-feed");
        const loadingSpinner = document.getElementById("loading-spinner");
        const errorMessage = document.getElementById("error-message");

        videoFeed.onload = () => {
            loadingSpinner.classList.add("hidden");
        };

        videoFeed.onerror = () => {
            loadingSpinner.classList.add("hidden");
            errorMessage.classList.remove("hidden");
        };
    </script>
</body>
</html>
