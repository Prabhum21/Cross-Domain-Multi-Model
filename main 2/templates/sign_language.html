<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤟 Sign Language Recognition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-blue-900 flex justify-center items-center min-h-screen">

    <div class="bg-white/10 backdrop-blur-xl p-6 rounded-2xl shadow-2xl text-center w-3/4 md:w-1/2 border border-white/20">
        <a href="/" class="absolute top-4 left-4 text-gray-300 hover:text-blue-400 transition-all">← Back to Home</a>
        <h1 class="text-3xl font-bold text-blue-400">🤟 Sign Language Recognition</h1>
        <p class="text-gray-300 mt-2">Recognize single and two-hand gestures in real-time.</p>

        <div class="flex justify-center my-4">
            <img src="{{ url_for('sign_language_feed') }}" class="rounded-xl shadow-lg border border-gray-500 w-full md:w-3/4 transition-all hover:scale-105">
        </div>

        <h2 class="text-xl text-gray-200">Detected Gesture: <span id="gesture-text" class="font-semibold text-blue-300">Waiting...</span></h2>

        <div class="flex justify-center gap-4 mt-4">
            <button onclick="showInstructions()" class="bg-gray-700 text-white px-6 py-3 rounded-xl shadow-md hover:bg-gray-800 hover:scale-105 transition-all">
                ℹ️ Instructions
            </button>
        </div>
    </div>

    <script>
        function updateGesture() {
            fetch('/gesture')
            .then(response => response.json())
            .then(data => {
                document.getElementById('gesture-text').innerText = data.gesture;
            });
        }

        function showInstructions() {
            alert("🤟 Gesture Controls:\n- ✊ Fist\n- 🖐 Open Hand\n- 👍 Thumbs Up\n- ✌ Victory\n- ☝ Pointing\n- 👌 OK Sign\n- 🤘 Rock Sign\n- ❤️ Heart Sign\n- 👏 Clap\n- ❌ Cross Hands\n- ✋✋ Stop");
        }

        setInterval(updateGesture, 500);
    </script>
</body>
</html>
