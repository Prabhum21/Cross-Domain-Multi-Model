<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaze Tracking Web Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-blue-900 flex justify-center items-center min-h-screen">
    <div class="bg-white/10 backdrop-blur-xl p-6 rounded-2xl shadow-2xl text-center w-3/4 md:w-1/2 border border-white/20">
        <a href="/" class="absolute top-4 left-4 text-gray-300 hover:text-blue-400 transition-all">← Back to Home</a>
        <h1 class="text-3xl font-bold text-blue-400">👀 Gaze Tracking Web Control</h1>
        <p class="text-gray-300 mt-2">Use your eyes to navigate seamlessly.</p>

        <div class="flex justify-center my-4">
            <img src="{{ url_for('gaze_feed') }}" class="rounded-xl shadow-lg border border-gray-500 w-full md:w-3/4 transition-all hover:scale-105">
        </div>

        <div class="flex justify-center gap-4">
            <button onclick="toggleFullScreen()" class="bg-blue-500 text-white px-6 py-3 rounded-xl shadow-md hover:bg-blue-600 hover:scale-105 transition-all">
                🔳 Fullscreen
            </button>
            <button onclick="showInstructions()" class="bg-gray-700 text-white px-6 py-3 rounded-xl shadow-md hover:bg-gray-800 hover:scale-105 transition-all">
                ℹ️ Instructions
            </button>
        </div>
    </div>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function showInstructions() {
            alert("👀 Gaze Controls:\n➡️ Look Right = Next Tab\n⬅️ Look Left = Previous Tab\n⬆️ Look Up = Scroll Up\n⬇️ Look Down = Scroll Down\n😉 Blink = Click");
        }
    </script>
</body>
</html>
